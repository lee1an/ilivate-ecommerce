<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ilivate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <h1 onclick="window.location.href='index.html'">Ilivate</h1>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="window.location.href='cart.html'" id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span id="cart-badge">0</span>
    </button>
  </div>
</header>

<section class="container">
  <div class="login-container">
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Login to access your account and continue shopping.</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Create Account</h2>
        <p>Join our community and start your shopping journey.</p>
      </div>
      <form id="register-form">
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required>
        </div>
        <button type="submit" class="btn btn-outline">Register</button>
      </form>
    </div>
    <div class="form-wrapper" id="verify-wrapper" style="display: none;">
      <form id="verify-form">
        <div class="form-header">
          <h2>Verify Your Account</h2>
          <p>Enter the 6-digit code sent to your email.</p>
        </div>
        <div class="form-group">
          <label for="verify-code">Verification Code</label>
          <input type="text" id="verify-code" required>
        </div>
        <button type="submit" class="btn btn-primary">Verify</button>
      </form>
    </div>
  </div>
</section>

<script src="login.js"></script>
</body>
</html>
