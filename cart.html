<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Ilivate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <h1 onclick="window.location.href='index.html'">Ilivate</h1>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="goToCart()" id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span id="cart-badge">0</span>
    </button>
    <button class="btn btn-ghost" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
      <span>Back</span>
    </button>
  </div>
</header>

<section class="container" style="padding-top: 3rem;">
  <h2 style="text-align: left; margin-bottom: 2rem;">Shopping Cart</h2>

  <div id="cart-items" class="products">
    <!-- Cart items will be injected here -->
  </div>

  <div class="cart-summary" style="max-width: 400px; margin: 2rem auto; background: var(--bg-card); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 1.25rem;">
    <h2 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">Order Summary</h2>
    
    <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 0.75rem; font-size: 1rem;">
      <span style="color: var(--text-muted);">Subtotal</span>
      <span id="subtotal" style="font-weight: 600;">₱0</span>
    </div>
    
    <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1rem;">
      <span style="color: var(--text-muted);">Shipping Fee</span>
      <span id="shipping" style="font-weight: 600;">₱100</span>
    </div>
    
    <div class="summary-row total" style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; margin-top: 1.5rem; margin-bottom: 2rem;">
      <span style="font-size: 1.25rem; font-weight: 700;">Total</span>
      <span id="total" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">₱0</span>
    </div>

    <button class="btn btn-primary checkout-btn" onclick="checkout()" style="width: 100%; padding: 1rem; border-radius: 0.75rem; font-size: 1.1rem; text-transform: none; letter-spacing: normal;">
      <i class="fas fa-lock"></i> Secure Checkout
    </button>
    
    <div style="text-align: center; margin-top: 1rem;">
      <a href="#" onclick="clearCart()" style="color: var(--danger); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Clear Cart</a>
    </div>

    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 2rem; text-align: center; opacity: 0.7;">
      <i class="fas fa-shield-alt"></i> Secure payment processing
    </p>
  </div>
</section>

<script src="cart.js"></script>
</body>
</html>
