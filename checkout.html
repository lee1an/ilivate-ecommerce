<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Ilivate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <h1 onclick="window.location.href='index.html'">Ilivate</h1>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="goToCart()" id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span id="cart-badge">0</span>
    </button>
    <button class="btn btn-ghost" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
      <span>Back to Cart</span>
    </button>
  </div>
</header>

<section class="container" style="padding-top: 3rem;">
  <div class="form-container">
    <h2 style="margin-top: 0; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
      <i class="fas fa-shipping-fast" style="color: var(--primary);"></i>
      Shipping & Payment
    </h2>
    
    <form id="checkout-form" style="max-width: none; margin: 0; padding: 0; border: none; background: transparent;">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      
      <div class="form-group">
        <label for="address">Shipping Address</label>
        <textarea id="address" placeholder="123 Street, City, Country" rows="3" required></textarea>
      </div>
      
      <div class="form-group">
        <label for="contact">Contact Number</label>
        <input type="text" id="contact" placeholder="+63 912 345 6789" required>
      </div>

      <div class="form-group">
        <label for="payment-method">Payment Method</label>
        <select id="payment-method" required>
          <option value="" disabled selected>Select Payment Method</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="GCash">GCash (QR Scan)</option>
        </select>
      </div>

      <div id="gcash-qr-container" style="display: none; text-align: center;">
        <p style="margin-bottom: 1rem; font-weight: 600;">Scan to Pay via GCash</p>
        <div style="background: white; padding: 0.5rem; display: inline-block; border-radius: 0.5rem; max-width: 100%;">
          <img src="images/gcash-qr.png" alt="GCash QR Code" id="gcash-qr-img" style="width: 250px; height: auto; display: block; border-radius: 0.25rem;">
        </div>
        <p style="font-size: 0.85rem; color: #64748b; margin-top: 0.75rem;">Please complete payment before placing order</p>
        
        <div class="form-group" style="margin-top: 1.5rem; text-align: left;">
          <label for="reference-number">GCash Reference Number</label>
          <input type="text" id="reference-number" placeholder="Enter 13-digit reference number">
        </div>
      </div>

      <div id="order-summary" style="margin: 2rem 0; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
        <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Order Summary</h3>
        <div id="summary-items" style="margin-bottom: 1rem;">
          <!-- Items will be inserted here by JS -->
        </div>
        <div class="summary-row total" style="display: flex; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--glass-border); font-weight: 700; font-size: 1.25rem; color: var(--accent);">
          <span>Total to Pay:</span>
          <span id="summary-total">₱0.00</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1.1rem;">
        Complete Purchase <i class="fas fa-check-circle" style="margin-left: 0.5rem;"></i>
      </button>
    </form>
  </div>
</section>

<script src="checkout.js"></script>
</body>
</html>
